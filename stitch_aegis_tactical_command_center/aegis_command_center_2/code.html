<style>
        body {
            background-color: #0A0E12; /* Base Level */
            color: #e0e2e8;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* Scanline Overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0) 50%,
                rgba(0, 0, 0, 0.2) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.5;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(11, 15, 19, 0.85); /* surface-container-lowest */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0, 218, 243, 0.02), 0 8px 32px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Subtle Inner glow for cards */
        .glass-card {
            background: rgba(16, 20, 24, 0.6); /* surface */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 10px rgba(0, 218, 243, 0.05);
        }
        
        .glass-card-header {
             background: rgba(0, 218, 243, 0.05);
             border-bottom: 1px solid rgba(255,255,255, 0.05);
        }

        /* Technical Bracket Decoration */
        .tech-bracket {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 20px;
            height: 20px;
            border-bottom: 2px solid rgba(0, 218, 243, 0.5);
            border-right: 2px solid rgba(0, 218, 243, 0.5);
            pointer-events: none;
        }

        /* Breathing Animation */
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 5px currentColor; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 15px currentColor; }
        }
        .status-pip {
            animation: breathe 3s infinite ease-in-out;
        }

        /* Scrolling Log Animation */
        @keyframes scroll-up {
            0% { transform: translateY(100%); opacity: 0; }
            10% { transform: translateY(0); opacity: 1; }
            90% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100%); opacity: 0; }
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 218, 243, 0.5);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 218, 243, 0.8);
        }
    </style>
</head>
