name: ARGUS Backend CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: argus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Validate Prisma Schema
        working-directory: ./backend
        run: |
          DATABASE_URL="postgresql://postgres:password123@localhost:5432/argus_test" npx prisma validate

      - name: Run Database Migrations
        working-directory: ./backend
        run: |
          DATABASE_URL="postgresql://postgres:password123@localhost:5432/argus_test" npx prisma db push --skip-generate

      - name: Run Test Suite
        working-directory: ./backend
        run: |
          DATABASE_URL="postgresql://postgres:password123@localhost:5432/argus_test" REDIS_URL="redis://localhost:6379" npm test

  docker-build:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false # Set to true and add registry login if deploying to ECR/DockerHub
          tags: argus-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
