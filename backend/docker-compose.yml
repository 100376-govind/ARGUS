version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: argus-db
    environment:
      POSTGRES_USER: argus_admin
      POSTGRES_PASSWORD: argus_secure_password
      POSTGRES_DB: argus_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus_admin -d argus_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: argus-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: argus-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://argus_admin:argus_secure_password@postgres:5432/argus_db?schema=public"
      REDIS_URL: "redis://redis:6379"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
